<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Flatlined | Stackly Healthcare</title>
    <!-- Meta tags for SEO -->
    <meta name="description" content="Diagnosis: Page Not Found. The page you are looking for has flatlined or is temporarily unavailable. Return to the Stackly Healthcare homepage.">
    
    <link rel="stylesheet" href="404style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <div class="error-container">
        <!-- Medical Heartbeat Flatline monitor inline SVG -->
        <div class="monitor-wrapper">
            <svg viewBox="0 0 400 220" class="monitor-svg" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="monitorGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#122543" />
                        <stop offset="100%" stop-color="#081427" />
                    </linearGradient>
                    <linearGradient id="neonGlow" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#ff3366" />
                        <stop offset="100%" stop-color="#ff003c" />
                    </linearGradient>
                    <filter id="neonFilter" x="-10%" y="-10%" width="120%" height="120%">
                        <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#ff003c" flood-opacity="0.8"/>
                    </filter>
                </defs>
                
                <!-- Monitor Screen Frame -->
                <rect x="10" y="10" width="380" height="200" rx="15" fill="url(#monitorGrad)" stroke="#1a2e4c" stroke-width="4" />
                
                <!-- Grid lines on monitor screen -->
                <g opacity="0.07" stroke="#00d2ff" stroke-width="1">
                    <line x1="10" y1="50" x2="390" y2="50" />
                    <line x1="10" y1="90" x2="390" y2="90" />
                    <line x1="10" y1="130" x2="390" y2="130" />
                    <line x1="10" y1="170" x2="390" y2="170" />
                    <line x1="60" y1="10" x2="60" y2="210" />
                    <line x1="110" y1="10" x2="110" y2="210" />
                    <line x1="160" y1="10" x2="160" y2="210" />
                    <line x1="210" y1="10" x2="210" y2="210" />
                    <line x1="260" y1="10" x2="260" y2="210" />
                    <line x1="310" y1="10" x2="310" y2="210" />
                    <line x1="360" y1="10" x2="360" y2="210" />
                </g>

                <!-- Status Tags -->
                <text x="30" y="38" fill="#ff003c" font-family="monospace" font-size="10" font-weight="bold" letter-spacing="1">SYSTEM: FLATLINED</text>
                <text x="310" y="38" fill="#ffb300" font-family="monospace" font-size="10" font-weight="bold">BPM: 00</text>

                <!-- Heartbeat wave showing flatline (animated in CSS) -->
                <g class="flatline-wave">
                    <path d="M 30 110 H 120 L 135 70 L 150 160 L 165 95 L 175 120 L 185 110 H 370" 
                          fill="none" stroke="url(#neonGlow)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"
                          filter="url(#neonFilter)" />
                </g>

                <!-- Warning Signal Blinker -->
                <circle cx="345" cy="180" r="6" fill="#ff003c" class="blinker" />
                <text x="210" y="184" fill="#a0c5eb" font-family="monospace" font-size="10">DIAGNOSIS: PAGE_NOT_FOUND</text>
                <text x="30" y="184" fill="#ff003c" font-family="monospace" font-size="11" font-weight="bold">ALERT 404</text>
            </svg>
        </div>

        <div class="badge">DIAGNOSIS: CRITICAL ERROR</div>
        
        <h1>404</h1>

        <h2>Oops! Page Has Flatlined</h2>

        <p>
            The medical record or clinical directory you are looking for has been moved, archived, or does not exist in our systems.
        </p>

        <form class="search-box" onsubmit="event.preventDefault(); alert('Searching database for records...');">
            <i class="fa-solid fa-magnifying-glass search-icon"></i>
            <input type="text" placeholder="Search medical registry..." required>
            <button type="submit" class="search-btn">Search</button>
        </form>

        <div class="actions">
            <a href="index.html" class="home-btn">
                <i class="fa-solid fa-house-medical"></i> Return To Clinic
            </a>
            <a href="index.html#contact" class="support-btn">
                <i class="fa-solid fa-headset"></i> Contact Support
            </a>
        </div>

        <div class="card-footer">
            <p><i class="fa-solid fa-shield-halved"></i> Secured by Stackly Health Core Systems</p>
        </div>
    </div>

</body>
</html>
